name: Bug report
description: Report a bug to help improve FilmuCore
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill in the details below so the issue can be reproduced and fixed.
        This template is intended for FilmuCore backend, worker, playback, and FilmuVFS problems.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Pick the part of the system that is failing.
      options:
        - REST or GraphQL API
        - Worker or queue pipeline
        - Playback or byte streaming
        - FilmuVFS catalog or gRPC
        - Linux or Unix mount (FUSE3)
        - Windows mount (ProjFS or WinFSP)
        - Plugin system
        - Build, CI, or release tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly and concisely.
      placeholder: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps needed to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Change ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened?
      placeholder: Describe what you saw.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened instead?
      placeholder: Describe the expected result.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: FilmuCore version
      description: State the version, tag, commit SHA, or package version.
      placeholder: e.g. v1.2.0
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: Regression?
      description: Did this work correctly before?
      options:
        - "No"
        - "Yes"
        - Not sure
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Host operating system
      placeholder: e.g. Windows 11 24H2, Ubuntu 24.04, macOS 15
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Runtime environment details
      description: Include only what is relevant for this bug.
      placeholder: |
        Example:
        - Python: 3.13.2
        - Rust: 1.87.0
        - Docker / Compose: 27.x / v2.35
        - Browser: Chrome 135
        - Media client: Plex 1.x, Jellyfin 10.x, Emby 4.x
        - Mount path: C:\FilmuCoreVFS or /mnt/filmuvfs

  - type: dropdown
    id: install_method
    attributes:
      label: Installation or deployment method
      options:
        - Local build
        - Docker
        - Package manager
        - Cloud deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste any relevant logs, stack traces, command output, or gRPC / media-server errors.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Add screenshots, screen recordings, or proof artifacts if they help explain the issue.

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add anything else that may help.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this one
          required: true
        - label: I included the affected area, version, and host environment
          required: true
        - label: I included clear steps to reproduce the problem
          required: true
        - label: I included logs, screenshots, or other relevant context where possible
          required: false
