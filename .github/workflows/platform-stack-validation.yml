name: Platform Stack Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docker-compose.yml"
      - "docker-compose.windows.yml"
      - "package.json"
      - "README.md"
      - "QUICK_START.md"
      - "WINDOWS_README.md"
      - "LINUX_UNIX_README.md"
      - "docs/LOCAL_DOCKER_STACK.md"
      - "scripts/start_local_stack.ps1"
      - "scripts/status_local_stack.ps1"
      - "scripts/stop_local_stack.ps1"
      - "scripts/start_windows_stack.ps1"
      - "check_windows_stack.ps1"
      - "scripts/status_windows_stack.ps1"
      - "scripts/stop_windows_stack.ps1"
      - "scripts/validate_platform_stack.ps1"

concurrency:
  group: platform-stack-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-platform-stack:
    name: Validate Platform Stack
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v4

      - name: Validate split Linux and Windows stack files
        shell: pwsh
        run: ./scripts/validate_platform_stack.ps1
