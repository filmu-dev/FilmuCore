name: Playback Gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docker-compose.local.yml"
      - "package.json"
      - "scripts/run_playback_proof.ps1"
      - "scripts/run_playback_proof_stability.ps1"
      - "run_playback_gate_ci.sh"
      - "scripts/run_media_server_proof_gate.ps1"
      - "scripts/run_windows_media_server_gate.ps1"
      - "scripts/run_windows_vfs_soak.ps1"
      - "filmu_py/api/routes/stream.py"
      - "filmu_py/core/byte_streaming.py"
      - "filmu_py/services/playback.py"
      - "filmu_py/workers/tasks.py"
      - "tests/test_stream_routes.py"
  pull_request:
    paths:
      - "docker-compose.local.yml"
      - "package.json"
      - "scripts/run_playback_proof.ps1"
      - "scripts/run_playback_proof_stability.ps1"
      - "run_playback_gate_ci.sh"
      - "scripts/run_media_server_proof_gate.ps1"
      - "scripts/run_windows_media_server_gate.ps1"
      - "scripts/run_windows_vfs_soak.ps1"
      - "filmu_py/api/routes/stream.py"
      - "filmu_py/core/byte_streaming.py"
      - "filmu_py/services/playback.py"
      - "filmu_py/workers/tasks.py"
      - "tests/test_stream_routes.py"
  merge_group:

concurrency:
  group: playback-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playback-gate:
    name: Playback Gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      FILMU_PY_REALDEBRID_API_TOKEN: ${{ secrets.FILMU_PY_REALDEBRID_API_TOKEN }}
      REAL_DEBRID_API_KEY: ${{ secrets.REAL_DEBRID_API_KEY }}
      FILMU_PY_ALLDEBRID_API_TOKEN: ${{ secrets.FILMU_PY_ALLDEBRID_API_TOKEN }}
      ALL_DEBRID_API_KEY: ${{ secrets.ALL_DEBRID_API_KEY }}
      FILMU_PY_DEBRIDLINK_API_TOKEN: ${{ secrets.FILMU_PY_DEBRIDLINK_API_TOKEN }}
      DEBRID_LINK_API_KEY: ${{ secrets.DEBRID_LINK_API_KEY }}
      FILMU_FRONTEND_CONTEXT: ${{ vars.FILMU_FRONTEND_CONTEXT != '' && vars.FILMU_FRONTEND_CONTEXT || format('{0}/Triven_frontend', github.workspace) }}
      FILMU_FRONTEND_REPOSITORY: ${{ vars.FILMU_FRONTEND_REPOSITORY }}
      FILMU_FRONTEND_REF: ${{ vars.FILMU_FRONTEND_REF }}
      FILMU_PREFERRED_CLIENT_BROWSER_EXECUTABLE: ${{ vars.FILMU_PREFERRED_CLIENT_BROWSER_EXECUTABLE }}
      FILMU_FRONTEND_USERNAME: ${{ vars.FILMU_FRONTEND_USERNAME }}
      FILMU_FRONTEND_PASSWORD: ${{ secrets.FILMU_FRONTEND_PASSWORD }}
      FILMU_PY_API_KEY: ${{ secrets.FILMU_PY_API_KEY }}
      FILMU_BACKEND_CONTAINER_NAME: filmu-python
      FILMU_PLAYBACK_REQUIRED_CHECK_NAME: Playback Gate / Playback Gate
      FILMU_PLAYBACK_DRY_RUN: ${{ (secrets.TMDB_API_KEY == '' || (secrets.FILMU_PY_REALDEBRID_API_TOKEN == '' && secrets.REAL_DEBRID_API_KEY == '' && secrets.FILMU_PY_ALLDEBRID_API_TOKEN == '' && secrets.ALL_DEBRID_API_KEY == '' && secrets.FILMU_PY_DEBRIDLINK_API_TOKEN == '' && secrets.DEBRID_LINK_API_KEY == '')) && '1' || '0' }}
      FILMU_PLAYBACK_STABILITY_HISTORY_ROOT: ${{ vars.FILMU_PLAYBACK_STABILITY_HISTORY_ROOT }}
      FILMU_PLAYBACK_ALLOW_STABILITY_BOOTSTRAP: ${{ vars.FILMU_PLAYBACK_ALLOW_STABILITY_BOOTSTRAP != '' && vars.FILMU_PLAYBACK_ALLOW_STABILITY_BOOTSTRAP || '0' }}
      PLEX_URL: http://localhost:32401
      EMBY_URL: http://localhost:8097
      PLEX_TOKEN: ${{ secrets.PLEX_TOKEN }}
      EMBY_API_KEY: ${{ secrets.EMBY_API_KEY }}
      FILMU_REQUIRE_PROVIDER_GATE: ${{ secrets.PLEX_TOKEN != '' && secrets.EMBY_API_KEY != '' && '1' || '0' }}
    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v5

      - name: Checkout frontend repo
        if: ${{ env.FILMU_FRONTEND_REPOSITORY != '' }}
        continue-on-error: true
        uses: actions/checkout@v5
        with:
          repository: ${{ env.FILMU_FRONTEND_REPOSITORY }}
          ref: ${{ vars.FILMU_FRONTEND_REF != '' && vars.FILMU_FRONTEND_REF || 'main' }}
          path: Triven_frontend

      - name: Provision hosted runner prerequisites
        shell: bash
        run: |
          set -euo pipefail

          browser_path="${FILMU_PREFERRED_CLIENT_BROWSER_EXECUTABLE:-}"
          if [[ -z "$browser_path" || ! -x "$browser_path" ]]; then
            for candidate in \
              "$(command -v google-chrome 2>/dev/null || true)" \
              "$(command -v google-chrome-stable 2>/dev/null || true)" \
              "$(command -v chromium 2>/dev/null || true)" \
              "$(command -v chromium-browser 2>/dev/null || true)" \
              "$(command -v microsoft-edge 2>/dev/null || true)" \
              "$(command -v msedge 2>/dev/null || true)"; do
              if [[ -n "$candidate" && -x "$candidate" ]]; then
                browser_path="$candidate"
                break
              fi
            done
          fi

          if [[ -n "$browser_path" && -x "$browser_path" ]]; then
            echo "FILMU_PREFERRED_CLIENT_BROWSER_EXECUTABLE=$browser_path" >> "$GITHUB_ENV"
          fi

          if [[ ! -e /dev/fuse ]]; then
            sudo modprobe fuse || true
          fi

          if [[ ! -e /dev/fuse ]]; then
            sudo mknod -m 666 /dev/fuse c 10 229 || true
          fi

      - name: Validate runner readiness
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path playback-proof-artifacts | Out-Null
          $hasTmdb = -not [string]::IsNullOrWhiteSpace([string] $env:TMDB_API_KEY)
          $debridKeys = @(
            [string] $env:FILMU_PY_REALDEBRID_API_TOKEN
            [string] $env:REAL_DEBRID_API_KEY
            [string] $env:FILMU_PY_ALLDEBRID_API_TOKEN
            [string] $env:ALL_DEBRID_API_KEY
            [string] $env:FILMU_PY_DEBRIDLINK_API_TOKEN
            [string] $env:DEBRID_LINK_API_KEY
          ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
          $hasDebrid = @($debridKeys).Count -gt 0
          $hasFrontendContext = -not [string]::IsNullOrWhiteSpace([string] $env:FILMU_FRONTEND_CONTEXT) -and (Test-Path -LiteralPath $env:FILMU_FRONTEND_CONTEXT)
          $hasBrowser = -not [string]::IsNullOrWhiteSpace([string] $env:FILMU_PREFERRED_CLIENT_BROWSER_EXECUTABLE) -and (Test-Path -LiteralPath $env:FILMU_PREFERRED_CLIENT_BROWSER_EXECUTABLE)
          if (-not $hasTmdb -or -not $hasDebrid -or -not $hasFrontendContext -or -not $hasBrowser) {
            $checks = [System.Collections.Generic.List[object]]::new()
            $checks.Add([pscustomobject]@{ name = 'tmdb_api_key'; required = $true; ok = $hasTmdb; details = 'TMDB_API_KEY is required.' })
            $checks.Add([pscustomobject]@{ name = 'debrid_provider_token'; required = $true; ok = $hasDebrid; details = 'At least one debrid provider token/key is required.' })
            $checks.Add([pscustomobject]@{ name = 'frontend_context'; required = $true; ok = $hasFrontendContext; details = 'FILMU_FRONTEND_CONTEXT must point to a readable frontend checkout.' })
            $checks.Add([pscustomobject]@{ name = 'browser_executable'; required = $true; ok = $hasBrowser; details = 'FILMU_PREFERRED_CLIENT_BROWSER_EXECUTABLE must point to an executable browser.' })
            [pscustomobject]@{
              timestamp = (Get-Date).ToString('o')
              require_provider_gate = ($env:FILMU_REQUIRE_PROVIDER_GATE -eq '1')
              status = 'dry_run'
              checks = $checks
            } | ConvertTo-Json -Depth 6 | Set-Content -Path playback-proof-artifacts/runner-readiness.json -Encoding UTF8
            "FILMU_PLAYBACK_DRY_RUN=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            if (-not $hasTmdb) {
              Write-Host '::warning title=playback gate dry-run fallback::tmdb_api_key - TMDB_API_KEY is required.'
            }
            if (-not $hasDebrid) {
              Write-Host '::warning title=playback gate dry-run fallback::debrid_provider_token - At least one debrid provider token/key is required.'
            }
            if (-not $hasFrontendContext) {
              Write-Host '::warning title=playback gate dry-run fallback::frontend_context - FILMU_FRONTEND_CONTEXT must point to a readable frontend checkout.'
            }
            if (-not $hasBrowser) {
              Write-Host '::warning title=playback gate dry-run fallback::browser_executable - FILMU_PREFERRED_CLIENT_BROWSER_EXECUTABLE must point to an executable browser.'
            }
            return
          }
          $readinessArgs = @('-AsJson')
          if ($env:FILMU_REQUIRE_PROVIDER_GATE -eq '1') {
            $readinessArgs += '-RequireProviderGate'
          }
          $readinessJson = ./scripts/check_playback_gate_runner.ps1 @readinessArgs
          $readinessJson | Set-Content -Path playback-proof-artifacts/runner-readiness.json -Encoding UTF8

      - name: Run playback gate
        run: |
          chmod +x ./run_playback_gate_ci.sh
          ./run_playback_gate_ci.sh

      - name: Capture expected merge policy proof
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path playback-proof-artifacts | Out-Null
          $policyArgs = @{
            Repository = '${{ github.repository }}'
            Branch = 'main'
            RequirePlaybackGate = $true
            MinimumApprovingReviewCount = 1
            RequireAdminsEnforced = $true
            AsJson = $true
          }
          if ($env:FILMU_REQUIRE_PROVIDER_GATE -eq '1') {
            $policyArgs.RequireProviderGate = $true
          }
          ./scripts/check_github_main_policy.ps1 @policyArgs |
            Set-Content -Path playback-proof-artifacts/github-main-policy-expected.json -Encoding UTF8

      - name: Validate live merge policy gate (admin-authenticated)
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.FILMU_POLICY_ADMIN_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path playback-proof-artifacts | Out-Null
          $eventName = '${{ github.event_name }}'
          if ([string]::IsNullOrWhiteSpace([string] $env:GH_TOKEN)) {
            [ordered]@{
              timestamp = (Get-Date).ToString('o')
              repository = '${{ github.repository }}'
              branch = 'main'
              validation = [ordered]@{
                status = 'skipped'
                details = "FILMU_POLICY_ADMIN_TOKEN is not configured; live admin-authenticated branch-policy validation was skipped for $eventName."
              }
            } | ConvertTo-Json -Depth 8 | Set-Content -Path 'playback-proof-artifacts/github-main-policy-current.json' -Encoding UTF8
            Write-Host "::warning title=live branch-policy validation skipped::FILMU_POLICY_ADMIN_TOKEN is not configured; configure the repository secret to restore admin-authenticated branch-policy validation for $eventName events."
            return
          }
          $policyArgs = @{
            Repository = '${{ github.repository }}'
            Branch = 'main'
            RequirePlaybackGate = $true
            MinimumApprovingReviewCount = 1
            RequireAdminsEnforced = $true
            ValidateCurrent = $true
            AsJson = $true
            OutputPath = 'playback-proof-artifacts/github-main-policy-current.json'
          }
          if ($env:FILMU_REQUIRE_PROVIDER_GATE -eq '1') {
            $policyArgs.RequireProviderGate = $true
          }
          ./scripts/check_github_main_policy.ps1 @policyArgs | Out-Host

      - name: Upload playback gate artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playback-gate-artifacts-${{ github.run_id }}
          path: |
            playback-proof-artifacts/**
            filmuvfs_logs_tail.txt
            compose_logs.txt
            compose_ps.txt
            frontend_logs*.txt
            worker_logs*.txt
            api_logs*.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Write playback gate summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Playback Gate"
            echo
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Required check name: \`${FILMU_PLAYBACK_REQUIRED_CHECK_NAME}\`"
            echo "- Provider parity gate required: \`${FILMU_REQUIRE_PROVIDER_GATE}\`"
            echo "- Artifacts: \`playback-gate-artifacts-${{ github.run_id }}\`"
            echo
            if [[ -f playback-proof-artifacts/runner-readiness.json ]]; then
              echo "Runner readiness artifact captured."
              if command -v jq >/dev/null 2>&1; then
                readiness_status="$(jq -r '.status // "unknown"' playback-proof-artifacts/runner-readiness.json)"
                echo "- Runner readiness status: \`${readiness_status}\`"
                mapfile -t readiness_failures < <(jq -r '.checks[] | select(.required == true and .ok == false) | "- " + .name + ": " + .details' playback-proof-artifacts/runner-readiness.json)
                if [[ "${#readiness_failures[@]}" -gt 0 ]]; then
                  echo
                  echo "### Missing readiness prerequisites"
                  printf '%s\n' "${readiness_failures[@]}"
                fi
              fi
            else
              echo "Runner readiness artifact missing."
            fi
            if [[ -f playback-proof-artifacts/ci-execution-summary.json ]]; then
              echo "CI execution summary artifact captured."
            else
              echo "CI execution summary artifact missing."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

