name: Publish Docker Images

on:
  push:
    branches:
      - main

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    name: Check publish configuration
    runs-on: ubuntu-latest
    outputs:
      docker_enabled: ${{ steps.check.outputs.docker_enabled }}
    steps:
      - name: Check Docker Hub secrets
        id: check
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKER_PUBLISH_ENABLED: ${{ vars.DOCKER_PUBLISH_ENABLED }}
        run: |
          if [[ "$DOCKER_PUBLISH_ENABLED" == "true" && -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
            echo "docker_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker_enabled=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish ${{ matrix.image }}
    needs: preflight
    if: ${{ needs.preflight.outputs.docker_enabled == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: s0lidbyte/filmu-python
            context: .
            dockerfile: ./Dockerfile.local
            cache-scope: filmu-python
            title: Filmu Python
            description: Python backend image for the Filmu project.
          - image: s0lidbyte/filmuvfs
            context: ./rust
            dockerfile: ./rust/filmuvfs/Dockerfile.local
            cache-scope: filmuvfs
            title: FilmuVFS
            description: Rust FilmuVFS sidecar image for the Filmu project.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=edge
            type=raw,value=main
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.vendor=s0lidbyte
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}

  skip-publish:
    name: Skip Docker publish
    needs: preflight
    if: ${{ needs.preflight.outputs.docker_enabled != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: echo "Skipping Docker publish because DOCKER_PUBLISH_ENABLED is not true or Docker Hub secrets are not configured."
