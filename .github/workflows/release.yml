name: Release Please

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  docker-preflight:
    name: Check Docker release configuration
    runs-on: ubuntu-latest
    outputs:
      docker_enabled: ${{ steps.check.outputs.docker_enabled }}
    steps:
      - name: Check Docker Hub secrets
        id: check
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKER_PUBLISH_ENABLED: ${{ vars.DOCKER_PUBLISH_ENABLED }}
        run: |
          if [[ "$DOCKER_PUBLISH_ENABLED" == "true" && -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
            echo "docker_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker_enabled=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      prs_created: ${{ steps.release.outputs.prs_created }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # The action defaults to github.token; keep PAT usage opt-in because
          # an org-scoped fine-grained PAT that lacks repo approval/permissions
          # will fail PR/tag creation.
          token: ${{ vars.RELEASE_PLEASE_USE_PAT == 'true' && secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Summarize release-please outcome
        if: always()
        shell: bash
        env:
          RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          PRS_CREATED: ${{ steps.release.outputs.prs_created }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          {
            echo "## Release Please"
            echo
            echo "- Branch: \`${GITHUB_REF}\`"
            echo "- release_created: \`${RELEASE_CREATED}\`"
            echo "- prs_created: \`${PRS_CREATED}\`"
            echo "- version: \`${RELEASE_VERSION}\`"
            echo "- tag_name: \`${RELEASE_TAG_NAME}\`"
            echo
            if [[ "${RELEASE_CREATED}" == "true" ]]; then
              echo "A release was created from this \`main\` push."
            elif [[ -n "${PRS_CREATED}" && "${PRS_CREATED}" != "[]" ]]; then
              echo "A release PR was opened or updated from this \`main\` push."
            else
              echo "No release PR or tag was created from this \`main\` push."
              echo
              echo "The usual cause is that the commits on \`main\` since the last release were not releasable Conventional Commits."
              echo "This repository expects squash merges with Conventional Commit PR titles as described in \`docs/RELEASE_PROCESS.md\`."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  dispatch-release-pr-verify:
    name: Dispatch Verify for release PRs
    needs:
      - release
    if: ${{ needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: read
    steps:
      - name: Dispatch verify workflow for open release PRs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              base: "main",
              per_page: 100,
            });

            const releasePulls = pulls.filter((pull) =>
              pull.labels.some((label) => label.name === "autorelease: pending")
            );

            if (releasePulls.length === 0) {
              core.summary
                .addHeading("Release PR verify dispatch")
                .addRaw("No open release PRs required a verify dispatch.")
                .write();
              return;
            }

            for (const pull of releasePulls) {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: "verify.yml",
                ref: pull.head.ref,
              });
            }

            core.summary
              .addHeading("Release PR verify dispatch")
              .addList(
                releasePulls.map((pull) => `Triggered verify.yml for #${pull.number} (${pull.head.ref})`)
              )
              .write();

  publish-release-images:
    name: Publish release image ${{ matrix.image }}
    needs:
      - docker-preflight
      - release
    if: ${{ needs.release.result == 'success' && needs.release.outputs.release_created == 'true' && needs.docker-preflight.outputs.docker_enabled == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: s0lidbyte/filmu-python
            context: .
            dockerfile: ./Dockerfile.local
            cache-scope: filmu-python
            title: Filmu Python
            description: Python backend image for the Filmu project.
          - image: s0lidbyte/filmuvfs
            context: ./rust
            dockerfile: ./rust/filmuvfs/Dockerfile.local
            cache-scope: filmuvfs
            title: FilmuVFS
            description: Rust FilmuVFS sidecar image for the Filmu project.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.tag_name }}
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=${{ needs.release.outputs.major }}.${{ needs.release.outputs.minor }}
            type=raw,value=${{ needs.release.outputs.major }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.vendor=s0lidbyte
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ needs.release.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}

  skip-release-image-publish:
    name: Skip release image publish
    needs:
      - docker-preflight
      - release
    if: ${{ needs.release.result == 'success' && needs.release.outputs.release_created == 'true' && needs.docker-preflight.outputs.docker_enabled != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: echo "Skipping release image publish because DOCKER_PUBLISH_ENABLED is not true or Docker Hub secrets are not configured."
