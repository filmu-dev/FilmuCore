name: Release Please

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-preflight:
    name: Check release configuration
    runs-on: ubuntu-latest
    outputs:
      release_enabled: ${{ steps.check.outputs.release_enabled }}
    steps:
      - name: Check release-please token
        id: check
        shell: bash
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [[ -n "$RELEASE_PLEASE_TOKEN" ]]; then
            echo "release_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_enabled=false" >> "$GITHUB_OUTPUT"
          fi

  docker-preflight:
    name: Check Docker release configuration
    runs-on: ubuntu-latest
    outputs:
      docker_enabled: ${{ steps.check.outputs.docker_enabled }}
    steps:
      - name: Check Docker Hub secrets
        id: check
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKER_PUBLISH_ENABLED: ${{ vars.DOCKER_PUBLISH_ENABLED }}
        run: |
          if [[ "$DOCKER_PUBLISH_ENABLED" == "true" && -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
            echo "docker_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker_enabled=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release Please
    needs: release-preflight
    if: ${{ needs.release-preflight.outputs.release_enabled == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      prs_created: ${{ steps.release.outputs.prs_created }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  skip-release:
    name: Skip release automation
    needs: release-preflight
    if: ${{ needs.release-preflight.outputs.release_enabled != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: echo "Skipping release-please because RELEASE_PLEASE_TOKEN is not configured."

  publish-release-images:
    name: Publish release image ${{ matrix.image }}
    needs:
      - docker-preflight
      - release
    if: ${{ needs.release.result == 'success' && needs.release.outputs.release_created == 'true' && needs.docker-preflight.outputs.docker_enabled == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: s0lidbyte/filmu-python
            context: .
            dockerfile: ./Dockerfile.local
            cache-scope: filmu-python
            title: Filmu Python
            description: Python backend image for the Filmu project.
          - image: s0lidbyte/filmuvfs
            context: ./rust
            dockerfile: ./rust/filmuvfs/Dockerfile.local
            cache-scope: filmuvfs
            title: FilmuVFS
            description: Rust FilmuVFS sidecar image for the Filmu project.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.tag_name }}
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=${{ needs.release.outputs.major }}.${{ needs.release.outputs.minor }}
            type=raw,value=${{ needs.release.outputs.major }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.vendor=s0lidbyte
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ needs.release.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}

  skip-release-image-publish:
    name: Skip release image publish
    needs:
      - docker-preflight
      - release
    if: ${{ needs.release.result == 'success' && needs.release.outputs.release_created == 'true' && needs.docker-preflight.outputs.docker_enabled != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: echo "Skipping release image publish because DOCKER_PUBLISH_ENABLED is not true or Docker Hub secrets are not configured."
