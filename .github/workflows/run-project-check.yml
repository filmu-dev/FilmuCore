name: Run Project Check

on:
  workflow_call:
    inputs:
      name:
        description: Human-readable job name
        required: true
        type: string
      command:
        description: Command to run
        required: true
        type: string
      python:
        description: Set up the Python toolchain and project dependencies
        required: false
        default: false
        type: boolean
      rust:
        description: Set up the Rust toolchain
        required: false
        default: false
        type: boolean
      rust_components:
        description: Optional comma-separated Rust components to install for this check
        required: false
        default: ""
        type: string
      fuse:
        description: Install FUSE system packages needed by Rust checks
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  run-check:
    name: ${{ inputs.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      UV_PROJECT_ENVIRONMENT: .venv-ci
      UV_LINK_MODE: copy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux system dependencies
        if: ${{ inputs.fuse }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fuse3 libfuse3-dev pkg-config

      - name: Set up Python
        if: ${{ inputs.python }}
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install Python dependencies
        if: ${{ inputs.python }}
        run: uv sync --frozen --extra dev

      - name: Set up Rust
        if: ${{ inputs.rust && inputs.rust_components == '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust with required components
        if: ${{ inputs.rust && inputs.rust_components != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: ${{ inputs.rust_components }}

      - name: Run ${{ inputs.name }}
        run: ${{ inputs.command }}

      - name: Upload check artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}-artifacts-${{ github.run_id }}
          path: ci-artifacts/**
          if-no-files-found: ignore
          retention-days: 14

