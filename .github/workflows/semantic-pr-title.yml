name: PR Title

run-name: "PR Title #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  pull-requests: read

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  semantic-title:
    name: Semantic PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate pull request title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            build
            ci
            chore
            docs
            test
          requireScope: false
