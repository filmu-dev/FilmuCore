name: Verify

run-name: "Verify ${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.ref_name }}"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify - ${{ matrix.task.name }}
    strategy:
      fail-fast: false
      matrix:
        task:
          - name: Python Lint
            command: uv run ruff check . && uv run mypy filmu_py
            python: true
            rust: false
            fuse: false
          - name: Python Tests
            command: uv run pytest -q
            python: true
            rust: false
            fuse: false
          - name: Rust Format
            command: cargo fmt --manifest-path ./rust/filmuvfs/Cargo.toml --all --check
            python: false
            rust: true
            fuse: false
          - name: Rust Check
            command: cargo check --manifest-path ./rust/filmuvfs/Cargo.toml
            python: false
            rust: true
            fuse: true
          - name: Rust Tests
            command: cargo test --manifest-path ./rust/filmuvfs/Cargo.toml
            python: false
            rust: true
            fuse: true
    uses: ./.github/workflows/run-project-check.yml
    with:
      name: ${{ matrix.task.name }}
      command: ${{ matrix.task.command }}
      python: ${{ matrix.task.python }}
      rust: ${{ matrix.task.rust }}
      fuse: ${{ matrix.task.fuse }}

