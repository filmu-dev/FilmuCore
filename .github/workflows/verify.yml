name: Verify

run-name: "Verify ${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.ref_name }}"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify - ${{ matrix.task.name }}
    strategy:
      fail-fast: false
      matrix:
        task:
          - name: Python Lint
            command: uv run ruff check . && uv run mypy filmu_py
            python: true
            rust: false
            fuse: false
          - name: Python Tests
            command: bash ./scripts/run_python_tests_ci.sh
            python: true
            rust: false
            fuse: false
          - name: Rust Format
            command: cargo fmt --manifest-path ./rust/filmuvfs/Cargo.toml --all --check
            python: false
            rust: true
            fuse: false
          - name: Rust Check
            command: cargo check --manifest-path ./rust/filmuvfs/Cargo.toml
            python: false
            rust: true
            fuse: true
          - name: Rust Tests
            command: cargo test --manifest-path ./rust/filmuvfs/Cargo.toml
            python: false
            rust: true
            fuse: true
          - name: Docs Runtime Contract
            command: pwsh -NoProfile -File ./scripts/check_docs_runtime_contract.ps1
            python: false
            rust: false
            fuse: false
          - name: Mount HTTP Chunk Parity
            command: pwsh -NoProfile -File ./scripts/check_mount_http_chunk_parity.ps1
            python: true
            rust: true
            fuse: true
          - name: Release Provenance Perf Chaos Gate
            command: pwsh -NoProfile -File ./scripts/generate_release_provenance_perf_chaos_evidence.ps1 -RunChaosContracts && pwsh -NoProfile -File ./scripts/check_release_provenance_perf_chaos_gate.ps1 -ChaosSummaryPaths ./ci-artifacts/release-gates/chaos-contract-summary.json -MaxReconnectIncidents 0 -MaxProviderPressureIncidents 0 -MaxFatalErrorIncidents 0
            python: true
            rust: true
            fuse: false
    uses: ./.github/workflows/run-project-check.yml
    with:
      name: ${{ matrix.task.name }}
      command: ${{ matrix.task.command }}
      python: ${{ matrix.task.python }}
      rust: ${{ matrix.task.rust }}
      fuse: ${{ matrix.task.fuse }}

