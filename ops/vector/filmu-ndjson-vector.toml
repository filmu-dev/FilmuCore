[sources.filmu_structured_logs]
type = "file"
include = ["logs/ecs.json", "logs/ecs.json.*"]
read_from = "end"

[transforms.filmu_json]
type = "remap"
inputs = ["filmu_structured_logs"]
source = '''
parsed, err = parse_json(.message)
if err == null {
  . = merge(., parsed)
  .filmu.mapping_version = "filmu-ecs-v1"
}
'''

[sinks.filmu_search_contract]
type = "console"
inputs = ["filmu_json"]
encoding.codec = "json"

[sinks.filmu_opensearch]
type = "elasticsearch"
inputs = ["filmu_json"]
endpoints = ["${FILMU_OPENSEARCH_ENDPOINT:-http://opensearch:9200}"]
mode = "bulk"
bulk.index = "${FILMU_OPENSEARCH_INDEX:-filmu-logs-%Y.%m.%d}"
healthcheck.enabled = true
compression = "gzip"
api_version = "v8"
auth.strategy = "basic"
auth.user = "${FILMU_OPENSEARCH_USER:-admin}"
auth.password = "${FILMU_OPENSEARCH_PASSWORD:-adminadmin}"
request.retry_attempts = 5
encoding.codec = "json"
